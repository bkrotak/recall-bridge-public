name: Build CouchCode APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: APK type
        required: true
        default: debug
        type: choice
        options: [debug, release]
      version_name:
        description: Release version name
        required: true
        default: 0.1.0
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate Firebase configuration
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          test -n "$GOOGLE_SERVICES_JSON_B64" || {
            echo "Add GOOGLE_SERVICES_JSON_B64 to Actions secrets."
            exit 1
          }
          printf '%s' "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > app/google-services.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Prepare release keystore
        if: inputs.build_type == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_STORE_PASSWORD"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/couchcode.jks"

      - name: Build debug APK
        if: inputs.build_type == 'debug'
        env:
          COUCHCODE_VERSION_CODE: ${{ github.run_number }}
          COUCHCODE_VERSION_NAME: ${{ inputs.version_name }}
        run: gradle --no-daemon :app:assembleDebug

      - name: Build signed release APK
        if: inputs.build_type == 'release'
        env:
          COUCHCODE_KEYSTORE_PATH: ${{ runner.temp }}/couchcode.jks
          COUCHCODE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          COUCHCODE_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          COUCHCODE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          COUCHCODE_VERSION_CODE: ${{ github.run_number }}
          COUCHCODE_VERSION_NAME: ${{ inputs.version_name }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: couchcode-${{ inputs.build_type }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/${{ inputs.build_type }}/*.apk
          if-no-files-found: error
